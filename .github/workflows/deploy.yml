name: agentic-gate

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment (dev|qa|prod)"
        required: true
        default: "dev"
  push:
    branches: ["main"]

jobs:
  evaluate:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Prepare payload
        id: payload
        shell: bash
        run: |
          set -euo pipefail

          env="${{ github.event.inputs.environment || 'dev' }}"
          diff_summary="$(git log -1 --pretty=%B | tr '\n' ' ')"

          echo "env=$env" >> "$GITHUB_OUTPUT"

          jq -n \
            --arg service "agentic-deploy-demo" \
            --arg env "$env" \
            --arg change_id "${GITHUB_SHA}" \
            --arg diff_summary "$diff_summary" \
            '{
              service:$service,
              env:$env,
              change_id:$change_id,
              diff_summary:$diff_summary,
              manifests:[{kind:"Deployment", name:"agentic-deploy-demo", namespace:$env}],
              metrics_snapshot:{error_rate:0.002,p95_ms:180},
              strategy_preference:"canary"
            }' > payload.json

          echo "Payload:"
          cat payload.json

      # ✅ Start Agentic Deploy inside this GitHub-hosted runner
      - name: Build Agentic Deploy image
        shell: bash
        run: |
          set -euo pipefail
          docker build -t agentic-deploy:ci .

      - name: Run Agentic Deploy container (Anthropic)
        shell: bash
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: claude-3-5-sonnet-latest
        run: |
          set -euo pipefail

          # Create audit folder on runner for volume mount
          mkdir -p data

          docker run -d --name agentic-deploy \
            -p 8080:8080 \
            -e PORT=8080 \
            -e MODE=anthropic \
            -e ANTHROPIC_MODEL="$ANTHROPIC_MODEL" \
            -e ANTHROPIC_API_KEY="${ANTHROPIC_API_KEY:-}" \
            -e AUDIT_PATH=/data/audit.jsonl \
            -v "$PWD/data:/data" \
            agentic-deploy:ci

      - name: Wait for health
        shell: bash
        run: |
          set -euo pipefail
          for i in {1..40}; do
            if curl -fsS "http://localhost:8080/health" >/dev/null; then
              echo "Gate is healthy"
              exit 0
            fi
            sleep 0.5
          done
          echo "Gate did not become healthy in time"
          docker logs agentic-deploy || true
          exit 1

      - name: Call Agentic Deploy
        shell: bash
        run: |
          set -euo pipefail
          curl -sS -X POST "http://localhost:8080/v1/evaluate" \
            -H "Content-Type: application/json" \
            -d @payload.json | jq .

      - name: Print gate logs (always)
        if: always()
        shell: bash
        run: |
          docker logs agentic-deploy || true
