name: agentic-gate

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment (dev|qa|prod)"
        required: true
        default: "dev"
  push:
    branches: ["main"]

jobs:
  evaluate:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Prepare payload
        id: payload
        shell: bash
        run: |
          set -euo pipefail

          env="${{ github.event.inputs.environment || 'dev' }}"

          # IMPORTANT: keep this on ONE line (no broken quotes)
          diff_summary="$(git log -1 --pretty=%B | tr '\n' ' ')"

          echo "env=$env" >> "$GITHUB_OUTPUT"

          # Build JSON safely (handles quotes/apostrophes in commit messages)
          jq -n \
            --arg service "agentic-deploy-demo" \
            --arg env "$env" \
            --arg change_id "${GITHUB_SHA}" \
            --arg diff_summary "$diff_summary" \
            '{
              service:$service,
              env:$env,
              change_id:$change_id,
              diff_summary:$diff_summary,
              manifests:[{kind:"Deployment", name:"agentic-deploy-demo", namespace:$env}],
              metrics_snapshot:{error_rate:0.002,p95_ms:180},
              strategy_preference:"canary"
            }' > payload.json

          echo "Payload:"
          cat payload.json

      - name: Call Agentic Deploy (Anthropic-powered)
        shell: bash
        env:
          GATE_URL: ${{ secrets.AGENTIC_GATE_URL }}
        run: |
          set -euo pipefail

          if [ -z "${GATE_URL:-}" ]; then
            echo "Missing secrets.AGENTIC_GATE_URL"
            exit 1
          fi

          curl -sS -X POST "$GATE_URL/v1/evaluate" \
            -H "Content-Type: application/json" \
            -d @payload.json | jq .
